[tox]
envlist = py39, py310, py311, py312
isolated_build = true

[testenv]
extras =
    dev
deps =
    pytest
commands =
    python -c "import reasoning_core"
    pytest {posargs:tests/}

[testenv:lint]
deps =
    vermin
commands =
    vermin --no-tips --backport argparse --target 3.9- reasoning_core/ tests/
